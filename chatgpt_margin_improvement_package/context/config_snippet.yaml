# Relevant parts of configs/config_best.yaml (training and MCTS weights)

training:
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  score_loss_weight: 0.3    # tanh targets; raised from 0.02 for balance
  ownership_loss_weight: 0.15

selfplay:
  mcts:
    simulations: 192
    parallel_leaves: 64
    static_score_utility_weight: 0.0   # Pure dynamic (KataGo self-play)
    dynamic_score_utility_weight: 0.3  # KataGo default: 0.3
    score_utility_scale: 30.0
  # Q-value mixing: blend root MCTS Q with game outcome for value targets
  # q_value_weight: set in config (e.g. 0.0 = pure outcome, 0.5 = 50/50)
