# Run invariance tests (D4 + shop order) on every push/PR.
# Required for "pinnacle" claim — these verify augmentation and encoding correctness.
name: Invariance Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  invariance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml pytest h5py numba
      - name: Run invariance tests
        run: |
          pytest tests/test_d4_augmentation.py tests/test_d4_action_equivariance.py tests/test_shop_order_markov_alignment.py tests/test_gold_v2_encoding.py -v
