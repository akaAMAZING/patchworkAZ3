  - iteration: 500
    q_value_weight: 0.48

  cpuct_schedule:
  - iteration: 0
    cpuct: 1.45
  - iteration: 80
    cpuct: 1.52
  - iteration: 180
    cpuct: 1.60
  - iteration: 300
    cpuct: 1.68
  - iteration: 400
    cpuct: 1.75
  - iteration: 470
    cpuct: 1.80

  noise_weight_schedule:
  - iteration: 0
    weight: 0.25
  - iteration: 140
    weight: 0.22
  - iteration: 260
    weight: 0.20
  - iteration: 360
    weight: 0.17
  - iteration: 430
    weight: 0.13
  - iteration: 470
    weight: 0.11

  games_schedule:
  - iteration: 0
    games: 900
  - iteration: 45
    games: 831
  - iteration: 80
    games: 771
  - iteration: 180
    games: 720
  - iteration: 260
    games: 680
  - iteration: 360
    games: 640
  - iteration: 430
    games: 600
