# PATCHWORK ALPHAZERO — FRESH RUN v2 (gold_v2_36ch, KataGo-aligned architecture)
# ============================================================================
# Hardware: RTX 3080 (10GB) / Ryzen 5900X (12 cores / 24 threads) / 16GB RAM
# Goal: Maximum playing strength — dominating, packing-aware, conversion-strong
# Strategy:
#   - gold_v2_36ch encoding: adds isolated-hole and constrained-empty planes (ch 32-35)
#     for both players, directly exposing packing quality to the network
#   - clean value/score separation: value head → pure binary P(win), score head → margin
#     (no blended target — each head has one job, combination in search only)
#   - hierarchical policy: type(3)→slot(3)→orient(8)→position(81) factorization
#     (each level is a small softmax — faster convergence than flat 2026-way)
#   - stronger score head (weight 0.30) and DSU (peak 0.35) for margin optimization
#   - ownership pos_weight=6.0 fixes empty-cell recall (~30% → target >60%)
#   - k_sqrt_coef=3 (was 8): PW now meaningfully prunes root BUY at ~320 sims
#   - packing alpha=0.70→0.04 (scheduled taper): heuristic bridges early horizon gap, fades as value head matures
#   - area_bonus=0.0: NN decides piece-size preference via ch32-35
#   - gate_dsu_enabled=true: DSU only engages when winning (win_start=0.45)
#   - value_delta_max=0.10 (was 0.06): wider candidate set for score tiebreak
#   - patch tiebreak enabled in training (hole-filling preference)
#   - PCR disabled: detrimental in Patchwork (position diversity is provided by D4 + noise)
#   - no packer opponent: dilutes training quality without meaningful diversity benefit
#   - evaluation vs pure MCTS every 10 iters: ground-truth progress signal
#
# USAGE:
#   python -m src.training.main --config configs/config_fresh_run.yaml
#
# IMPORTANT: This is a FRESH RUN. Delete any old replay data before starting.
# NOTE AT ITER 300: Consider raising epochs_per_iteration from 2 to 3.

seed: 42
deterministic: false

hardware:
  device: cuda
  pin_memory: true
  persistent_workers: true
  prefetch_batches: 2

data:
  allow_legacy_state_channels: false
  encoding_version: gold_v2_36ch
  expected_spatial_channels: 36
  expected_global_dim: 65
  expected_track_shape: [8, 54]
  expected_shop_shapes: [33, 10]

network:
  input_channels: 60          # 36 encoded + 24 GPU-computed legalTL
  num_res_blocks: 18
  channels: 128
  policy_channels: 48
  policy_hidden: 512
  use_factorized_policy_head: true    # ignored when use_hierarchical_policy is true
  use_hierarchical_policy: true       # factored type→slot→orient→pos decomposition
  value_channels: 48
  value_hidden: 512
  max_actions: 2026
  dropout: 0.0
  weight_decay: 0.0002
  use_batch_norm: true
  activation: relu
  se_ratio: 0.0625
  ownership_channels: 48
  use_film: true
  film_hidden: 256
  film_global_dim: 65          # updated for 65-dim global
  film_track_dim: 432
  film_shop_dim: 128
  film_per_block: true
  film_track_use_conv: true
  film_global_inject_dim: 64
  aux_channels: 32               # auxiliary heads: 7x7 bonus pred + opp threat (32-ch bottleneck)

training:
  optimizer: adamw
  learning_rate: 0.0016
  lr_schedule: cosine_warmup_per_phase
  warmup_steps: 20
  d4_augmentation: dynamic
  d4_on_gpu: false
  d4_gpu_deterministic_test_mode: false
  resume_optimizer_state: false  # fresh run — no prior optimizer state
  resume_scheduler_state: false
  resume_scaler_state: false
  resume_ema_state: false
  resume_from_committed_state: false
  min_lr: 0.000032
  batch_size: 1024
  use_amp: true
  amp_dtype: bfloat16
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  score_loss_weight: 0.30       # sole margin signal now (value head is pure P(win), no blended margin)
  ownership_loss_weight: 0.15
  ownership_pos_weight: 6.0     # raised from 4.0: upweights empty cells 6× to fix recall (~30% → target >60%)
  bonus7x7_loss_weight: 0.10    # 7x7 bonus prediction head (binary BCE, 2 outputs: my/opp)
  opp_threat_loss_weight: 0.05  # opponent board threat head (regression MSE, scalar in [0,1])
  policy_entropy_bonus_weight: 0.003  # resist late-training policy collapse; -coef*H(pi) in loss
  value_label_smoothing: 0.02   # clamp value targets to [-0.98, +0.98]; prevents logit saturation
  epochs_per_iteration: 2       # NOTE: raise to 3 at iter 300
  val_split: 0.08
  val_frequency: 1000
  checkpoint_frequency: 10000
  keep_last_n_checkpoints: 200
  save_best: false
  best_metric: val_loss
  early_stopping:
    enabled: false
    patience: 5
    min_delta: 0.001
  max_grad_norm: 1.0
  allow_tf32: true
  matmul_precision: high
  ema:
    enabled: true
    decay: 0.999
    use_for_selfplay: true
    use_for_eval: true
    save_checkpoint: true

selfplay:
  api_url: null
  inference_backend: null
  api_timeout: 120
  api_retry_attempts: 3
  num_workers: 12
  max_game_length: 200
  games_per_iteration: 900
  store_canonical_only: true
  augmentation: d4
  mcts:
    simulations: 192
    parallel_leaves: 64
    static_score_utility_weight: 0.0
    dynamic_score_utility_weight: 0.00   # overridden by schedule below
    score_utility_scale: 30.0
    progressive_widening:
      enabled: true
      k_root: 64
      k0: 32
      k_sqrt_coef: 3              # was 8; now K_buy≈96 at root (320 sims), real pruning
      always_include_pass: true
      always_include_patch: true
    packing_ordering:
      enabled: true
      alpha: 0.70                  # was 0.25; now competitive with log-prior spread (~5 nats)
      use_log_prior: true
      local_check_radius: 2
      weights:
        adj_edges: 0.25
        corner_bonus: 0.0
        iso_hole_penalty: 6.0
        frontier_penalty: 0.0
        area_bonus: 0.0            # NN decides piece-size preference; area is not a reliable proxy for packing quality
    cpuct: 1.45
    temperature: 1.0
    temperature_threshold: 15
    root_dirichlet_alpha: 0.10
    root_noise_weight: 0.25
    virtual_loss: 1.0
    num_threads: 1
    fpu_reduction: 0.25
    win_first:
      enabled: true
      value_delta_min: 0.01
      value_delta_max: 0.10        # was 0.06; wider candidate set → more score-based selection
      value_delta_win_start: 0.60
      value_delta_win_full: 0.90
      gate_dsu_enabled: true       # was false; DSU now only fires when winning (prevents loss-position over-extension)
      gate_dsu_win_start: 0.45
      gate_dsu_win_full: 0.75
      gate_dsu_power: 2.0
      gate_dsu_loss_start: -0.90
      gate_dsu_loss_full: -0.98
      tiebreak: score_then_visits
      filter_before_sampling: true
    patch_tiebreak:
      enabled: true                # was disabled in training; prefer hole-filling PATCH actions
      win_prob_floor: 0.88         # fires only in clear wins (Qv ≥ 0.76); iso-hole encoder features handle early-game packing
  playout_cap_randomization:
    enabled: false                  # disabled: detrimental in Patchwork
    cap_fraction: 0.25
    fast_probability: 0.20
  bootstrap:
    use_pure_mcts: true
    mcts_simulations: 192
    games: 900
  stream_to_disk: true
  hdf5_compression: lzf
  hdf5_compression_level: 0
  write_buffer_positions: 8192
  policy_target_mode: visits
  q_value_weight: 0.15            # start lower; schedule ramps up
  opponent_mix:
    enabled: false                 # disabled: packer opponent dilutes quality without real diversity benefit

replay_buffer:
  max_size: 300000
  min_size: 4000
  window_iterations: 8
  newest_fraction: 0.25
  recency_weight_lambda: 0.95   # geometric decay: w_i = lambda^(max_iter-i) * n_i; 1.0 = uniform
  prioritized: false
  storage_format: hdf5
  compression: lzf
  compression_level: 0

evaluation:
  lock_eval_cpuct_to_selfplay: true
  games_vs_best: 0
  games_vs_pure_mcts: 0           # disabled: pure MCTS is too weak (beaten from iter 1)
  games_vs_anchor: 0              # disabled: run manually via scripts/run_ladder_eval.py when needed
  eval_progress_interval: 0
  paired_eval: false
  skip_pure_mcts_after_iter: 0

  # Fixed cross-architecture anchor: iter192 (56ch) vs new run (60ch).
  # Loaded once at startup; both models use their own encoder and config.
  # Update the path if your iter192 is in a different location.
  anchor_checkpoint:
    path: "C:/Users/Shanks/Desktop/Codes/patchworkaz - Copy - v2 - Copy/runs/patchwork_production/committed/iter_192/iteration_192.pt"
    config: "configs/config_best.yaml"

  # Ladder eval: every `interval` iters, play `games` games vs iter N-lookback.
  # Primary LR-readiness signal. WR→implied Elo gap: 55%→+35, 57%→+50, 53%→+18, 50%→0.
  # Decision rule: if step gap < 15 Elo for 2 consecutive steps, LR has done its work.

  ladder_eval:
    enabled: true
    interval: 5       # run every 5 iters (iter 5, 10, 15, 20, 25, 30, ...)
    lookback: 5       # compare iter N vs iter N-5
    games: 200        # max games per match; SPRT will stop early when confident
    sprt:
      enabled: true
      p0: 0.50        # H0: win rate ≤ this  (no improvement)
      p1: 0.55        # H1: win rate ≥ this  (standard Stockfish/KataGo threshold)
      alpha: 0.05     # false-positive rate  (standard: 1-in-20 max)
      beta:  0.05     # false-negative rate  (standard: 1-in-20 max)
      min_games: 60   # always play at least this many regardless of LLR
                      # typical savings: ~40-60% fewer games on clearly stronger models

  eval_baselines:
  - type: pure_mcts
    simulations: 64
  - type: previous_best
  win_rate_threshold: 0.0
  anti_regression_floor: 0.0
  max_consecutive_rejections: 1
  sprt:
    enabled: false
    p0: 0.50
    p1: 0.55
    alpha: 0.05
    beta: 0.05
    min_games: 12
    max_games: 400
  micro_gate:
    enabled: false
    start_games: 10
    step_games: 10
    max_games: 60
    anti_regression_threshold: 0.42
  eval_mcts:
    simulations: 192
    temperature: 0.0
    cpuct: 1.75
  elo:
    enabled: true                 # was false; Glicko-2 Elo tracking vs fixed baselines
    initial_rating: 1500
    k_factor: 32

logging:
  log_level: INFO
  tensorboard:
    enabled: true
    log_dir: logs/tensorboard
  wandb:
    enabled: false
    project: patchwork-alphazero
    entity: null
  log_file: logs/training.log

paths:
  checkpoints_dir: checkpoints
  logs_dir: logs
  run_root: runs
  run_id: patchwork_fresh_v2

iteration:
  max_iterations: 500
  auto_resume: true

  adaptive_games:
    enabled: true
    last_k: 3
    min_factor: 0.90
    max_factor: 1.20
    fill_threshold: 0.95
    fill_max_factor: 1.50
    fallback_avg_len: 42.0
    max_step_change: 0.15
    max_step_change_fill: 0.35

  lr_schedule:
  - iteration: 0
    lr: 0.0016
  - iteration: 35
    lr: 0.0016
  - iteration: 45
    lr: 0.0012
  - iteration: 90
    lr: 0.0012
  - iteration: 100
    lr: 0.0008
  - iteration: 250
    lr: 0.0008
  - iteration: 300
    lr: 0.0006
  - iteration: 400
    lr: 0.0004
  - iteration: 500
    lr: 0.00025

  temperature_schedule:
  - iteration: 0
    temperature: 1.00
  - iteration: 80
    temperature: 0.80
  - iteration: 160
    temperature: 0.60
  - iteration: 360
    temperature: 0.40
  - iteration: 430
    temperature: 0.30
  - iteration: 470
    temperature: 0.25

  mcts_schedule:
  - iteration: 0
    simulations: 192
  - iteration: 45
    simulations: 224
  - iteration: 80
    simulations: 256
  - iteration: 180
    simulations: 288
  - iteration: 250
    simulations: 320
  - iteration: 350
    simulations: 352
  - iteration: 430
    simulations: 384
  - iteration: 470
    simulations: 416
  - iteration: 500
    simulations: 448

  parallel_leaves_schedule:
  - iteration: 0
    parallel_leaves: 64
  - iteration: 45
    parallel_leaves: 56
  - iteration: 180
    parallel_leaves: 48
  - iteration: 300
    parallel_leaves: 40
  - iteration: 420
    parallel_leaves: 32
  - iteration: 470
    parallel_leaves: 24

  dirichlet_alpha_schedule:
  - iteration: 0
    alpha: 0.10
  - iteration: 120
    alpha: 0.08
  - iteration: 300
    alpha: 0.06
  - iteration: 420
    alpha: 0.05
  - iteration: 500
    alpha: 0.04

  packing_alpha_schedule:
  - iteration: 0
    alpha: 0.70   # early: bridge search-horizon gap before value head learns hole costs
  - iteration: 45
    alpha: 0.30   # LR drop → trust NN more; ch32-35 signal accumulating
  - iteration: 100
    alpha: 0.15   # second LR phase; value head should associate holes with loss
  - iteration: 150
    alpha: 0.08   # mostly NN-driven packing from here
  - iteration: 200
    alpha: 0.04   # trace heuristic only; NN owns packing strategy

  score_sigma_schedule:
  - iteration: 0
    sigma: 2.5    # early: wide Gaussian over noisy game outcomes
  - iteration: 100
    sigma: 1.5    # mid: current default — converging value head
  - iteration: 200
    sigma: 1.0    # late: sharp target, score head mature

  dynamic_score_utility_weight_schedule:
  - iteration: 0
    dynamic_score_utility_weight: 0.00
  - iteration: 10
    dynamic_score_utility_weight: 0.05
  - iteration: 25
    dynamic_score_utility_weight: 0.12
  - iteration: 45
    dynamic_score_utility_weight: 0.20
  - iteration: 60
    dynamic_score_utility_weight: 0.35  # sole margin signal in search (value head is pure P(win))
  - iteration: 500
    dynamic_score_utility_weight: 0.35

  q_value_weight_schedule:
  - iteration: 0
    q_value_weight: 0.15
  - iteration: 30
    q_value_weight: 0.20
  - iteration: 80
    q_value_weight: 0.25
  - iteration: 150
    q_value_weight: 0.30
  - iteration: 250
    q_value_weight: 0.35
  - iteration: 350
