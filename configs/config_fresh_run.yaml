  - iteration: 500
    games: 530

  window_iterations_schedule:
  - iteration: 0
    window_iterations: 8
  - iteration: 45
    window_iterations: 9
  - iteration: 80
    window_iterations: 10
  - iteration: 180
    window_iterations: 11
