    window_iterations: 12
  - iteration: 360
    window_iterations: 13
  - iteration: 430
    window_iterations: 14
  - iteration: 470
    window_iterations: 15
  - iteration: 500
    window_iterations: 16

inference:
  batch_size: 512
  max_batch_wait_ms: 3
  use_amp: true
  amp_dtype: bfloat16
  torch_compile: false
  allow_tf32: true

league:
  enabled: false
  pfsp_alpha: 2.0
  pfsp_uniform_prob: 0.10
  sp_frac_vs_best: 0.40
  sp_frac_vs_pfsp: 0.50
  sp_frac_vs_uniform: 0.10
  gate_threshold: 0.55
  suite_threshold: 0.52
  worst_threshold: 0.40
  gate_eval_games: 100
  suite_eval_games: 50
  max_pool_size: 30
  anchor_size: 6
  anchor_refresh_interval: 5
  payoff_max_models: 30
  exploiter_enabled: false
  exploiter_train_games: 100
  exploiter_temp_boost: 1.5
  recency_newest_frac: 0.70
  recency_newest_window: 0.15
